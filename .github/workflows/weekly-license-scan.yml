name: Weekly OSS License Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:       # Allow manual triggering

permissions:
  contents: read
  issues: write

jobs:
  # ── Job 1: enumerate all repositories owned by the authenticated user ────────
  list-repos:
    name: List Repositories
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.get-repos.outputs.matrix }}
    steps:
      - name: Fetch all owned repositories
        id: get-repos
        uses: actions/github-script@v7
        with:
          # Use the built-in GITHUB_TOKEN to list repos — no extra secret required.
          # listForUser returns all public repos for the owner. To include private
          # repos in the listing, replace github.token with secrets.GH_PAT and swap
          # listForUser for listForAuthenticatedUser (with visibility:'all').
          github-token: ${{ github.token }}
          script: |
            const repos = await github.paginate(
              github.rest.repos.listForUser,
              { username: context.repo.owner, type: 'owner', per_page: 100 }
            );

            // Exclude archived repos and forks.
            // GitHub Actions enforces a hard limit of 256 jobs per matrix
            // (see https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow#about-matrix-strategies).
            // Exceeding that limit causes the workflow to fail at queue time, so
            // we cap the list at 256 entries. If you own more than 256 repos and
            // want to scan them all, split this workflow into multiple runs (e.g.
            // by paginating with an offset env var, or by filtering on repo topics/
            // language) and schedule each run at a different time.
            const include = repos
              .filter(r => !r.archived && !r.fork)
              .slice(0, 256)
              .map(r => ({ name: r.name, full_name: r.full_name }));

            core.setOutput('matrix', JSON.stringify({ include }));
            core.notice(
              `Scheduling ${include.length} of ${repos.length} repositories for scanning`
            );

  # ── Job 2: analyze each repository via the official ORT GitHub Action ────────
  analyze:
    name: Scan ${{ matrix.name }}
    needs: list-repos
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.list-repos.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5
    steps:
      - name: Checkout ${{ matrix.full_name }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.full_name }}
          # Fall back to github.token for public repositories so GH_PAT is only
          # required when private repository access is needed.
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1

      # ── ORT Analyzer + Reporter via the official ORT CI GitHub Action ─────────
      # Pinned to v1.1.0 (latest stable tag as of 2025-02).
      # TODO: update pin when a newer stable tag is released
      # (see https://github.com/oss-review-toolkit/ort-ci-github-action/tags).
      - name: Run GitHub Action for ORT
        id: ort
        continue-on-error: true
        uses: oss-review-toolkit/ort-ci-github-action@v1.1.0
        with:
          allow-dynamic-versions: 'true'
          report-formats: 'StaticHtml,SpdxDocument,CycloneDx'
          # Run only analyzer and reporter; skip scanner, evaluator, advisor,
          # and the built-in upload-results so we control the artifact name below.
          run: 'analyzer, reporter'

      # ── Upload per-repo artifacts ─────────────────────────────────────────────
      - name: Upload ORT results for ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ort-results-${{ matrix.name }}
          path: ${{ steps.ort.outputs.results-path }}
          retention-days: 90

  # ── Job 3: aggregate all results into a single summary ───────────────────────
  summarize:
    name: Generate License Summary
    needs: analyze
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ort-results-*
          path: all-ort-results

      - name: Write summary to workflow output
        run: |
          {
            echo "# 📦 Weekly OSS License Scan Results"
            echo ""
            echo "**Scan Date:** $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "**Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "| Repository | Analyzer | Reports |"
            echo "| --- | :---: | :---: |"

            for dir in all-ort-results/ort-results-*/; do
              repo="${dir#all-ort-results/ort-results-}"
              repo="${repo%/}"
              analyzer_ok="❌"
              reports_ok="❌"
              [ -f "$dir/analyzer-result.json" ] && analyzer_ok="✅"
              [ -f "$dir/scan-report.html"      ] && reports_ok="✅"
              echo "| \`$repo\` | $analyzer_ok | $reports_ok |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined license reports
        uses: actions/upload-artifact@v4
        with:
          name: all-license-reports-${{ github.run_id }}
          path: all-ort-results/
          retention-days: 90
